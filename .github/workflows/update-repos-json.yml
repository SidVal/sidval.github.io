name: Update repos JSON

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update-repos-json:
    name: Fetch GitHub repositories
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate data/repos.json
        run: node processors/fetch-repos.js
        env:
          GITHUB_USERNAME: sidval
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit generated repos.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/repos.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update repos.json from GitHub API"
          git push
